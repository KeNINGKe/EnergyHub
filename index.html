<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Info Hub · 能源 / 储能 / AIDC</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>⚡ Energy Info Hub</h1>
      <p class="tagline">电力 · 储能 · AIDC 信息聚合导航与日报</p>
      <nav class="tabs" aria-label="主标签">
        <button class="tab-btn active" data-tab="nav">📑 信息源导航</button>
        <button class="tab-btn" data-tab="daily">📰 日报</button>
        <button class="tab-btn" data-tab="weekly">📚 周报</button>
        <button class="tab-btn" data-tab="deep">🔬 深研</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- 信息源导航 -->
    <section id="nav" class="tab-panel active" aria-labelledby="tab-nav">
      <div class="nav-layout">
        <aside class="category-list" id="categoryList">
          <div class="loading">加载分类中…</div>
        </aside>
        <div class="sources-area" id="sourcesArea">
          <div class="loading">加载信息源中…</div>
        </div>
      </div>
    </section>

    <!-- 日报 -->
    <section id="daily" class="tab-panel" aria-labelledby="tab-daily">
      <div class="feed-header">
        <h2>📰 日报 <span id="dailyDate" class="feed-subtitle"></span></h2>
        <p class="feed-note">自动抓取各源 RSS 最近 24 小时内容，点击标题跳转原文。</p>
      </div>
      <div id="dailyList" class="feed-list">
        <div class="loading">加载日报中…</div>
      </div>
    </section>

    <!-- 周报 -->
    <section id="weekly" class="tab-panel" aria-labelledby="tab-weekly">
      <div class="feed-header">
        <h2>📚 周报 <span id="weeklyRange" class="feed-subtitle"></span></h2>
        <p class="feed-note">聚合过去 7 天内容。</p>
      </div>
      <div id="weeklyList" class="feed-list">
        <div class="loading">加载周报中…</div>
      </div>
    </section>

    <!-- 深研 -->
    <section id="deep" class="tab-panel" aria-labelledby="tab-deep">
      <div class="feed-header">
        <h2>🔬 深研</h2>
        <p class="feed-note">精选长文/研报摘要，建议手动或 AI 辅助填充。</p>
      </div>
      <div id="deepList" class="feed-list">
        <div class="loading">加载深研中…</div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      数据更新: <span id="updatedAt">-</span>
      · 本地预览请运行 <code>npm run preview</code>
      · <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
    </p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
