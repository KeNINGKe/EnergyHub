name: Fetch RSS Feeds

on:
  schedule:
    # 北京时间每天 05:00 = UTC 21:00（前一天）
    - cron: '0 21 * * *'
    # 北京时间每天 12:00 = UTC 04:00
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS
        run: npm run fetch

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily feed"
            git push
          fi
