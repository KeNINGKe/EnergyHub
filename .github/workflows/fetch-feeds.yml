name: Fetch RSS Feeds

on:
  schedule:
    # 北京时间每天 07:00 = UTC 23:00
    - cron: '0 23 * * *'
    # 北京时间每周一 07:00 = UTC 周日 23:00
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '抓取模式: daily 或 weekly'
        required: true
        default: 'daily'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" == "0 23 * * 0" ]; then
            MODE="weekly"
          else
            MODE="daily"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "Running mode: $MODE"

      - name: Fetch RSS
        run: npm run fetch:${{ steps.mode.outputs.mode }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ${{ steps.mode.outputs.mode }} feed [skip ci]"
            git push
          fi
